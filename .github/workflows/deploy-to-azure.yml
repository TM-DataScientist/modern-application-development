name: Build & Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ secrets.ACR_SERVER }}

      - name: Build and push container image to registry
        run: |
          az acr build \
            --registry ${{ secrets.ACR_SERVER }} \
            --image ${{ secrets.ACR_REPOSITORY }}:${{ github.sha }} \
            ./app

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve ACR login server
        id: acr
        run: |
          echo "login_server=$(az acr show --name ${{ secrets.ACR_SERVER }} --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ secrets.ACA_NAME }} \
            --resource-group ${{ secrets.RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.login_server }}/${{ secrets.ACR_REPOSITORY }}:${{ github.sha }}
